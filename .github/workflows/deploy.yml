# ============================================================================
# FILE: marisselle-teacher/.github/workflows/deploy.yml
# GITHUB ACTIONS - 24/7 Deployment & Keepalive
# ============================================================================

name: Deploy Teacher & Keep Alive

on:
  push:
    branches: [main]
    paths:
      - '**.js'
      - '**.html'
      - '**.wasm'
      - '**.json'
      - '.github/workflows/deploy.yml'
  schedule:
    # Keep alive every 4 hours (prevents Pages sleep)
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # Manual trigger available

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.50
          actions-cache-folder: emsdk-cache
      
      - name: Build Ollama WASM
        run: |
          mkdir -p build
          cd build
          emcmake cmake ..
          emmake make -j$(nproc)
          cp ollama.wasm ../ollama.wasm
        env:
          CFLAGS: "-O3 -msimd128 -msse2"
          CXXFLAGS: "-O3 -msimd128 -msse2"
          LDFLAGS: "-O3 -s WASM=1 -s ALLOW_MEMORY_GROWTH=1 -s TOTAL_MEMORY=2GB -s USE_PTHREADS=1 -s PTHREAD_POOL_SIZE=4"
      
      - name: Download phi3-mini Model
        run: |
          mkdir -p phi3-model
          # Download quantized model from HuggingFace
          wget -q --show-progress \
            https://huggingface.co/microsoft/Phi-3-mini-4k-instruct-gguf/resolve/main/Phi-3-mini-4k-instruct-q4_K_M.gguf \
            -O phi3-model/phi3-mini-q4_0.gguf
          
          # Download tokenizer
          wget -q --show-progress \
            https://huggingface.co/microsoft/Phi-3-mini-4k-instruct/resolve/main/tokenizer.json \
            -O phi3-model/tokenizer.json
          
          # Create config
          cat > phi3-model/config.json << 'EOF'
          {
            "model_type": "phi3",
            "vocab_size": 32064,
            "hidden_size": 3072,
            "intermediate_size": 8192,
            "num_hidden_layers": 32,
            "num_attention_heads": 32,
            "num_key_value_heads": 8,
            "hidden_act": "silu",
            "max_position_embeddings": 4096,
            "rms_norm_eps": 1e-5,
            "rope_theta": 10000.0,
            "sliding_window": 2048,
            "quantization": "q4_K_M"
          }
          EOF
          
          # Verify file sizes
          echo "Model size: $(du -h phi3-model/phi3-mini-q4_0.gguf | cut -f1)"
      
      - name: Build Service Worker
        run: |
          cat > sw.js << 'EOF'
          const CACHE_NAME = 'marisselle-teacher-v1';
          const urlsToCache = [
            '/',
            '/index.html',
            '/teacher.js',
            '/ollama-worker.js',
            '/ollama.wasm',
            '/phi3-model/phi3-mini-q4_0.gguf',
            '/phi3-model/tokenizer.json',
            '/phi3-model/config.json'
          ];
          
          self.addEventListener('install', event => {
            event.waitUntil(
              caches.open(CACHE_NAME)
                .then(cache => cache.addAll(urlsToCache))
            );
          });
          
          self.addEventListener('fetch', event => {
            event.respondWith(
              caches.match(event.request)
                .then(response => response || fetch(event.request))
            );
          });
          
          self.addEventListener('activate', event => {
            event.waitUntil(
              caches.keys().then(keys => Promise.all(
                keys.map(key => {
                  if (key !== CACHE_NAME) return caches.delete(key);
                })
              ))
            );
          });
          EOF
      
      - name: Create keepalive script
        run: |
          cat > keepalive.js << 'EOF'
          // GitHub Pages keepalive - prevents cold starts
          setInterval(async () => {
            try {
              const response = await fetch('/api/teacher/status');
              const status = await response.json();
              console.log('[KEEPALIVE] Teacher status:', status);
              
              // Log to demonstrate activity
              const timestamp = new Date().toISOString();
              console.log(`[${timestamp}] Heartbeat - Model: ${status.online}, Tokens: ${status.metrics?.totalTokens || 0}`);
            } catch (e) {
              console.error('[KEEPALIVE] Error:', e);
            }
          }, 240000); // Every 4 minutes
          EOF
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Build site
        run: |
          # Copy all files to deployment directory
          mkdir -p _site
          cp index.html _site/
          cp teacher.js _site/
          cp ollama-worker.js _site/
          cp sw.js _site/
          cp keepalive.js _site/
          cp ollama.wasm _site/
          cp -r phi3-model _site/
          
          # Create .nojekyll for proper WASM handling
          touch _site/.nojekyll
          
          # Create _headers for security
          cat > _site/_headers << 'EOF'
          /*
            Cross-Origin-Embedder-Policy: require-corp
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Resource-Policy: cross-origin
            X-Content-Type-Options: nosniff
            X-Frame-Options: DENY
          EOF
          
          # Create _redirects for API routes
          cat > _site/_redirects << 'EOF'
          /api/teacher/*    /index.html    200
          EOF
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  
  deploy:
    needs: build-wasm
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Notify Core
        run: |
          curl -X POST https://yaiwon.github.io/Core/api/teacher/register \
            -H "Content-Type: application/json" \
            -d '{
              "teacher_url": "${{ steps.deployment.outputs.page_url }}",
              "status": "online",
              "model": "phi3-mini-wasm",
              "capabilities": ["generation", "pedagogy", "amoral", "continuous"]
            }'
  
  keepalive:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'schedule'
    steps:
      - name: Ping teacher instance
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
            https://yaiwon.github.io/marisselle-teacher/api/teacher/status
          
          curl -s -o /dev/null -w "Health check: %{http_code}\n" \
            https://yaiwon.github.io/marisselle-teacher/
          
          echo "Keepalive ping sent at $(date -u)"
