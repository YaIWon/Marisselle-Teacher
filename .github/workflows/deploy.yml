# ============================================================================
# FILE: .github/workflows/deploy.yml
# PATH: /marisselle-teacher/.github/workflows/deploy.yml
# PURPOSE: Deploy Teacher to GitHub Pages
# VERSION: 4.0.0 - Complete deployment
# ============================================================================

name: Deploy Teacher

on:
  push:
    branches: [main]
    paths:
      - '**.js'
      - '**.html'
      - '**.json'
      - '**.yml'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Build site
        run: |
          mkdir -p _site
          
          # Copy all files
          cp index.html teacher.js keepalive.js sw.js ollama-worker.js _site/ 2>/dev/null || true
          cp curriculum.json tracker.json .teacher_progress.json _site/ 2>/dev/null || true
          cp _headers _redirects .nojekyll _site/ 2>/dev/null || true
          
          # Copy API directory
          cp -r api _site/ 2>/dev/null || true
          
          # Copy training_data
          cp -r training_data _site/ 2>/dev/null || true
          
          # Copy WASM files
          cp ollama.wasm _site/ 2>/dev/null || true
          
          # Copy phi3-model if it exists
          cp -r phi3-model _site/ 2>/dev/null || true
          
          # Verify files
          echo "📁 _site contents:"
          ls -la _site/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
